name: _ Checkout Speed Test

on:
  push:
    branches:
      - brian/checkout-speed-test

jobs:
  measure-checkout:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, 'swift-build-windows-latest-8-cores', 'swift-build-windows-latest-64-cores']

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4.2.2

      - name: Setup Dev Drive
        run: ${{ github.workspace }}/.github/workflows/setup-dev-drive.ps1

      - name: Print Drives
        shell: pwsh
        run: |
          Write-Host "Drives: $(Get-PSDrive -PSProvider FileSystem)"

      - name: Measure raw git checkout time
        id: raw-git
        shell: pwsh
        run: |
          Write-Host "Starting raw git checkout measurement..."
          $start_time = Get-Date

          git clone --depth=1 --no-checkout --quiet https://github.com/swiftlang/llvm-project.git raw-test
          git -C raw-test checkout HEAD

          $end_time = Get-Date
          $duration = ($end_time - $start_time).TotalSeconds

          Write-Host "Raw git checkout completed in ${duration} seconds"
          echo "duration=$duration" >> $env:GITHUB_OUTPUT

      - name: Measure raw git checkout time (Dev or D drive)
        id: raw-git-dev
        shell: pwsh
        run: |
          Write-Host "Starting raw git checkout measurement..."
          $start_time = Get-Date

          git clone --depth=1 --no-checkout --quiet https://github.com/swiftlang/llvm-project.git ${{ env.DEV_DRIVE }}\${{ env.BCNY_WORKSPACE }}\raw-test-faster-drive
          git -C ${{ env.DEV_DRIVE }}\${{ env.BCNY_WORKSPACE }}\raw-test-faster-drive checkout HEAD

          $end_time = Get-Date
          $duration = ($end_time - $start_time).TotalSeconds

          Write-Host "Raw git checkout completed in ${duration} seconds"
          echo "duration=$duration" >> $env:GITHUB_OUTPUT

      - name: Record start time
        id: start-time
        shell: pwsh
        run: |
          Write-Host "Starting actions/checkout measurement..."
          $start_time = Get-Date
          echo "timestamp=$($start_time.ToString('o'))" >> $env:GITHUB_OUTPUT

      - name: Perform actions/checkout
        uses: actions/checkout@v4.2.2
        with:
          repository: swiftlang/llvm-project
          fetch-depth: 1
          path: actions-checkout-test
          show-progress: false

      - name: Calculate actions/checkout duration
        id: actions-checkout-duration
        shell: pwsh
        run: |
          $end_time = Get-Date
          $start_time = [DateTime]::Parse('${{ steps.start-time.outputs.timestamp }}')
          $duration = ($end_time - $start_time).TotalSeconds

          Write-Host "actions/checkout completed in ${duration} seconds"
          echo "duration=$duration" >> $env:GITHUB_OUTPUT
